---
engines:
  bandit:
    enabled: true
  ruff:
    enabled: true
  pylint:
    enabled: false
  prospector:
    enabled: false
  pydocstyle:
    enabled: false
  pycodestyle:
    enabled: false
  pyflakes:
    enabled: false

exclude_paths:
  - "tests/**"
  - "dist/**"
  - "*.egg-info/**"
  - ".pytest_cache/**"
  - "**/__pycache__/**"
  - "examples/**"
  # SECURITY.md is kept markdownlint-clean by hand; excluded here because
  # Codacy's prose/agent-file analyzer misclassifies a security policy doc
  # (flags incident-response steps as "absolute rules needing an escape hatch"
  # and suggests splitting it into SOUL.md/USER.md/TOOLS.md).
  - "SECURITY.md"
